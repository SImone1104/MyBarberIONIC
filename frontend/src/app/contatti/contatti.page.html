<ion-header class="ion-no-border">
  <app-header></app-header>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="contatti-container">
    <div class="header-section">
      <h1>Contattaci</h1>
      <p class="subtitle">Hai dubbi sul tuo prossimo taglio? Contattaci, troveremo insieme il look perfetto per te.</p>
    </div>

    <div class="contatti-grid">
      <div class="info-side">
        <div class="info-card">
          <h3>Indirizzo</h3>
          <p>{{ contatti.indirizzo }}</p>
          <a [href]="contatti.mapsUrl" target="_blank" rel="noopener" class="map-link">Ottieni indicazioni</a>
        </div>

        <div class="info-card">
          <h3>Orari di Apertura</h3>
          <ul>
            <li *ngFor="let riga of contatti.orari">
              <span [class.closed]="riga.toLowerCase().includes('chiuso')">{{ riga }}</span>
            </li>
          </ul>
        </div>

        <div class="info-card">
          <h3>Recapiti Diretti</h3>
          <p>Telefono: <a [href]="'tel:' + contatti.telefono" class="contact-link">{{ contatti.telefono }}</a></p>
          <p>Email: <a [href]="'mailto:' + contatti.email" class="contact-link">{{ contatti.email }}</a></p>
        </div>
      </div>

      <div class="form-side">
        <div id="map"></div>
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</ion-content>
