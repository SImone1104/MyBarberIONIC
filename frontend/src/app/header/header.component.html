<header class="site-header">
  <nav class="navbar" aria-label="Navigazione principale">
    <a routerLink="/contatti" class="mobile-header-action contact-action" aria-label="Vai ai contatti">
      <ion-icon name="call-outline"></ion-icon>
    </a>

    <a routerLink="/home" class="brand" (click)="closeMenus()" aria-label="Vai alla home">
      <img src="assets/logo.svg" alt="Logo MyBarber" class="brand-logo">
    </a>

    <div class="menu-backdrop" *ngIf="dropdownOpen" (click)="closeMenus()"></div>

    <div class="nav-panel">
      <ul class="nav-links">
        <li>
          <a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenus()">
            <span class="nav-icon home-icon" aria-hidden="true"></span>
            <span>Home</span>
          </a>
        </li>
        <li>
          <a routerLink="/prenotazioni" routerLinkActive="active" (click)="closeMenus()">
            <span class="nav-icon booking-icon" aria-hidden="true"></span>
            <span>Prenotazioni</span>
          </a>
        </li>
        <li>
          <a routerLink="/servizi" routerLinkActive="active" (click)="closeMenus()">
            <span class="nav-icon services-icon" aria-hidden="true"></span>
            <span>Servizi</span>
          </a>
        </li>
        <li>
          <a routerLink="/contatti" routerLinkActive="active" (click)="closeMenus()">
            <span class="nav-icon contact-icon" aria-hidden="true"></span>
            <span>Contatti</span>
          </a>
        </li>
        <li *ngIf="authService.isAdmin()">
          <a routerLink="/barbiere/dashboard" routerLinkActive="active" (click)="closeMenus()">
            <span class="nav-icon services-icon" aria-hidden="true"></span>
            <span>Barbiere</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="account-menu">
      <a *ngIf="!authService.isLoggedIn()" routerLink="/login" class="login-btn" (click)="closeMenus()">
        <img src="assets/profile-circle-svgrepo-com.svg" class="account-icon" alt="">
        <span>Accedi</span>
      </a>

      <div *ngIf="authService.isLoggedIn()" class="user-dropdown-container">
        <button
          class="user-btn"
          [class.has-alerts]="mostraBadgeAppuntamenti()"
          type="button"
          (click)="toggleDropdown()"
          [attr.aria-expanded]="dropdownOpen"
          [attr.aria-label]="mostraBadgeAppuntamenti() ? 'Apri menu profilo, ci sono appuntamenti da gestire' : 'Apri menu profilo'">
          <span class="user-avatar">{{ authService.getUsername().charAt(0).toUpperCase() }}</span>
          <span class="user-copy">
            <span class="user-label">Area personale</span>
            <strong>{{ authService.getUsername() }}</strong>
          </span>
          <span
            *ngIf="mostraBadgeAppuntamenti()"
            class="alert-badge user-alert-badge"
            aria-label="Appuntamenti da gestire"></span>
          <span class="chevron" aria-hidden="true"></span>
        </button>

        <div class="dropdown-menu" [class.open]="dropdownOpen">
          <div class="dropdown-heading">
            <span class="user-avatar">{{ authService.getUsername().charAt(0).toUpperCase() }}</span>
            <div>
              <strong>{{ authService.getUsername() }}</strong>
              <small>Gestisci il tuo profilo</small>
            </div>
            <button class="profile-close" type="button" (click)="closeMenus()" aria-label="Chiudi menu profilo">
              <span aria-hidden="true">x</span>
            </button>
          </div>
          <a class="dropdown-item" routerLink="/profilo" (click)="closeMenus()">
            <span>Il mio profilo</span>
          </a>
          <a class="dropdown-item appointments-dropdown-item" routerLink="/miei-appuntamenti" (click)="closeMenus()">
            <span>I miei appuntamenti</span>
            <span
              *ngIf="mostraBadgeAppuntamenti()"
              class="alert-badge dropdown-alert-badge"
              aria-label="Appuntamenti da gestire"></span>
          </a>
          <a class="dropdown-item" *ngIf="authService.isAdmin()" routerLink="/barbiere/dashboard" (click)="closeMenus()">
            <span>Area barbiere</span>
          </a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item logout-text" (click)="eseguireLogout()">
            <span>Logout</span>
          </button>
        </div>
      </div>
    </div>

    <a
      [routerLink]="authService.isAdmin() ? '/barbiere/dashboard' : '/miei-appuntamenti'"
      class="mobile-header-action appointments-action"
      [attr.aria-label]="authService.isAdmin() ? 'Vai all area barbiere' : 'Vai ai miei appuntamenti'">
      <ion-icon name="calendar-number-outline"></ion-icon>
      <span
        *ngIf="mostraBadgeAppuntamenti()"
        class="alert-badge mobile-alert-badge"
        aria-label="Appuntamenti da gestire"></span>
    </a>
  </nav>
</header>
