<footer class="main-footer">
  <div class="footer-shell">
    <section class="footer-section" aria-labelledby="footer-studio">
      <h4 id="footer-studio">Studio</h4>
      <ul class="footer-list">
        <li>{{ contatti.indirizzo }}</li>
        
      </ul>
    </section>

    <section class="footer-section" aria-labelledby="footer-contatti">
      <h4 id="footer-contatti">Contatti</h4>
      <ul class="footer-list">
        <li><a [href]="'tel:' + contatti.telefono">{{ contatti.telefono }}</a></li>
        <li><a [href]="'mailto:' + contatti.email">{{ contatti.email }}</a></li>
      </ul>
    </section>

    <section class="footer-section" aria-labelledby="footer-social">
      <h4 id="footer-social">Social</h4>
      <div class="social-links" aria-label="Link social MyBarber">
        <a [href]="contatti.instagramUrl" target="_blank" rel="noopener" aria-label="Instagram">
          <span class="social-icon instagram-icon" aria-hidden="true"></span>
          <span>Instagram</span>
        </a>
        <a [href]="contatti.facebookUrl" target="_blank" rel="noopener" aria-label="Facebook">
          <span class="social-icon facebook-icon" aria-hidden="true"></span>
          <span>Facebook</span>
        </a>
        <a [href]="contatti.tiktokUrl" target="_blank" rel="noopener" aria-label="TikTok">
          <span class="social-icon tiktok-icon" aria-hidden="true"></span>
          <span>TikTok</span>
        </a>
      </div>
    </section>
  </div>

  <div class="footer-bottom">
    <p>&copy; 2026 MyBarber. Progetto Unipa 2025/26 Ingegneria Informatica by Simone Sottile & Giuseppe Giacomarra.</p>
    <a routerLink="/contatti">Contattaci</a>
  </div>
</footer>
